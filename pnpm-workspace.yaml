packages:
  - "apps/*"
  - "packages/*"
  - "templates/*"
  - "examples/*"

templates:
  - "templates/*"

# Reduciing the risk of installing fresh compromised packages before detected
minimumReleaseAge: 4320 ## 3 days
minimumReleaseAgeExclude:
  - '@shopware/*'
  - '@typescript/native-preview'
  - 'happy-dom'
  - '@vue/test-utils'
  - '@adyen/adyen-web'

auditConfig:
  ignoreGhsas:
    - CVE-2025-68458
    - CVE-2025-68157
    - CVE-2024-43788
overrides:
  axios: ^1.16.1
  minimatch: ^10.2.5
  undici: ^6.24.0
  unbuild: ^3.6.1
  uuid: ^14.0.0
peerDependencyRules:
  ignoreMissing:
    - webpack
    - vite
    - react-dom
    - react
    - '@types/react'
    - '@algolia/client-search'
shamefullyHoist: true
autoInstallPeers: true
strictPeerDependencies: false
preferWorkspacePackages: true
enablePrePostScripts: true
preferFrozenLockfile: true
preferOffline: true
verifyDepsBeforeRun: false
linkWorkspacePackages: deep
allowBuilds:
  '@biomejs/biome': true
  '@parcel/watcher': true
  esbuild: true
  sharp: true
  vue-demi: true
