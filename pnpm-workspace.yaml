packages:
  - "apps/*"
  - "packages/*"
  - "templates/*"
  - "examples/*"

templates:
  - "templates/*"

# Reduciing the risk of installing fresh compromised packages before detected
minimumReleaseAge: 4320 ## 3 days
minimumReleaseAgeExclude:
  - '@shopware/*'
  - '@typescript/native-preview'
  - 'happy-dom'
  - '@vue/test-utils'
  - '@adyen/adyen-web'
  - 'axios' # remove after 18/06/2026
  - 'astro' # remove after 17/06/2026

overrides:
  axios: ^1.18.0
  minimatch: ^10.2.5
  undici: ^6.24.0
  # jsdom (pulled in by @sanity/codegen via @nuxtjs/sanity) needs undici 7.
  # Scope it to jsdom so the rest of the workspace keeps the undici ^6 pin.
  "jsdom>undici": "^7"
  # Sanity Studio's CLI/build stack natively requires Vite 8 (its @vitejs/plugin-react@6
  # imports `vite/internal`, which only exists in Vite 8). The global `vite: ^7.3.5`
  # pin below would cap it at Vite 7 and break `sanity build`, so scope Vite 8 to the
  # Sanity chain only - the storefront packages keep the Vite 7 line.
  "@sanity/cli>vite": "^8.0.16"
  "@sanity/cli-core>vite": "^8.0.16"
  "@sanity/cli-build>vite": "^8.0.16"
  "@sanity/runtime-cli>vite": "^8.0.16"
  "@vitejs/plugin-react>vite": "^8.0.16"
  "@rolldown/plugin-babel>vite": "^8.0.16"
  unbuild: ^3.6.1
  uuid: ^14.0.0
  shell-quote: ^1.8.4
  esbuild: ^0.28.1
  ws: ^8.21.0
  form-data: ^4.0.6
  vite: ^7.3.5
  tar: ^7.5.16
  launch-editor: ^2.14.1
  js-yaml: ^4.2.0
  markdown-it: ^14.2.0
  "@babel/core": "^7.29.6"

peerDependencyRules:
  ignoreMissing:
    - webpack
    - vite
    - react-dom
    - react
    - '@types/react'
    - '@algolia/client-search'
shamefullyHoist: true
autoInstallPeers: true
strictPeerDependencies: false
preferWorkspacePackages: true
enablePrePostScripts: true
preferFrozenLockfile: true
preferOffline: true
verifyDepsBeforeRun: false
linkWorkspacePackages: deep
allowBuilds:
  '@biomejs/biome': true
  '@parcel/watcher': true
  esbuild: true
  sharp: true
  vue-demi: true
