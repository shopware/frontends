packages:
  - "apps/*"
  - "packages/*"
  - "templates/*"
  - "examples/*"

templates:
  - "templates/*"

# Reduciing the risk of installing fresh compromised packages before detected
minimumReleaseAge: 4320 ## 3 days
minimumReleaseAgeExclude:
  - '@shopware/*'
  - '@typescript/native-preview'
  - 'happy-dom'
  - '@vue/test-utils'
  - '@adyen/adyen-web'
  - 'axios' # remove after 18/06/2026
  - 'astro' # remove after 17/06/2026

overrides:
  axios: ^1.18.0
  minimatch: ^10.2.5
  undici: ^6.27.0
  "jsdom>undici": "^7"
  # Sanity's build stack needs Vite 8; the rest of the workspace stays on Vite 7.
  "@sanity/cli>vite": "^8.0.16"
  "@sanity/cli-core>vite": "^8.0.16"
  "@sanity/cli-build>vite": "^8.0.16"
  "@sanity/runtime-cli>vite": "^8.0.16"
  "@vitejs/plugin-react>vite": "^8.0.16"
  "@rolldown/plugin-babel>vite": "^8.0.16"
  unbuild: ^3.6.1
  uuid: ^14.0.0
  shell-quote: ^1.8.4
  esbuild: ^0.28.1
  ws: ^8.21.0
  form-data: ^4.0.6
  vite: ^8.0.16
  vue: 3.5.38
  "@vue/compiler-core": 3.5.38
  "@vue/compiler-dom": 3.5.38
  "@vue/compiler-sfc": 3.5.38
  "@vue/compiler-ssr": 3.5.38
  "@vue/reactivity": 3.5.38
  "@vue/runtime-core": 3.5.38
  "@vue/runtime-dom": 3.5.38
  "@vue/server-renderer": 3.5.38
  "@vue/shared": 3.5.38
  tar: ^7.5.16
  launch-editor: ^2.14.1
  js-yaml: ^4.2.0
  markdown-it: ^14.2.0
  "@babel/core": "^7.29.6"

peerDependencyRules:
  ignoreMissing:
    - webpack
    - vite
    - react-dom
    - react
    - '@types/react'
    - '@algolia/client-search'
shamefullyHoist: true
autoInstallPeers: true
strictPeerDependencies: false
preferWorkspacePackages: true
enablePrePostScripts: true
preferFrozenLockfile: true
preferOffline: true
verifyDepsBeforeRun: false
linkWorkspacePackages: deep
allowBuilds:
  '@biomejs/biome': true
  '@parcel/watcher': true
  esbuild: true
  sharp: true
  vue-demi: true
